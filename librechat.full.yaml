version: 1.3.6
cache: true
registration:
  socialLogins: []

endpoints:
  custom:
    - name: "Ollama"
      apiKey: "ollama"
      baseURL: "http://host.docker.internal:11434/v1"
      models:
        default: ["llama3.2:3b", "llama3.1:8b", "qwen2.5:7b"]
      modelDisplayLabel: "Ollama Local"

    - name: "OpenAI"
      apiKey: "${OPENAI_API_KEY}"
      baseURL: "https://api.openai.com/v1"
      models:
        default: ["gpt-4o-mini", "gpt-4.1-mini"]
      modelDisplayLabel: "OpenAI"

    - name: "Anthropic"
      apiKey: "${ANTHROPIC_API_KEY}"
      baseURL: "https://api.anthropic.com/v1"
      models:
        default: ["claude-3-5-haiku-latest"]
      modelDisplayLabel: "Anthropic"

    - name: "Google"
      apiKey: "${GOOGLE_API_KEY}"
      baseURL: "https://generativelanguage.googleapis.com/v1beta/openai"
      models:
        default: ["gemini-2.0-flash"]
      modelDisplayLabel: "Google Gemini"

    - name: "Mistral"
      apiKey: "${MISTRAL_API_KEY}"
      baseURL: "https://api.mistral.ai/v1"
      models:
        default: ["mistral-small-latest"]
      modelDisplayLabel: "Mistral"

    - name: "Groq"
      apiKey: "${GROQ_API_KEY}"
      baseURL: "https://api.groq.com/openai/v1"
      models:
        default: ["llama-3.3-70b-versatile"]
      modelDisplayLabel: "Groq"

    - name: "OpenRouter"
      apiKey: "${OPENROUTER_API_KEY}"
      baseURL: "https://openrouter.ai/api/v1"
      models:
        default: ["openai/gpt-4o-mini"]
      modelDisplayLabel: "OpenRouter"

    - name: "Together"
      apiKey: "${TOGETHER_API_KEY}"
      baseURL: "https://api.together.xyz/v1"
      models:
        default: ["meta-llama/Llama-3.1-8B-Instruct-Turbo"]
      modelDisplayLabel: "Together"

mcpServers:
  filesystem:
    type: stdio
    command: npx
    args:
      - -y
      - "@modelcontextprotocol/server-filesystem"
      - "/app"
