name: Build and Release NodeTerm

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Linux packaging tools (bsdtar, rpm)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Webpack
        run: npm run build

      - name: Cleanup native dependencies
        run: npm run rm-cpu-features

      - name: Extract Release Notes from CHANGELOG
        if: matrix.os == 'ubuntu-latest'
        run: |
          node -e "
            const fs = require('fs');
            const version = process.env.GITHUB_REF_NAME ? process.env.GITHUB_REF_NAME.replace(/^v/, '') : '';
            let notes = '';
            if (fs.existsSync('CHANGELOG.md')) {
              const changelog = fs.readFileSync('CHANGELOG.md', 'utf8').replace(/\r\n/g, '\n');
              const escapedVersion = version.replace(/\./g, '\\.');
              const regex = new RegExp('## \\\\[' + escapedVersion + '\\\\][^\\n]*\\n([\\s\\S]*?)(?=\\n## \\\\[|$)', 'g');
              const match = regex.exec(changelog);
              if (match && match[1]) notes = match[1].trim();
            }
            fs.writeFileSync('RELEASE_NOTES_BODY.md', notes || '### Novedades en esta versión\n- Mejoras generales y correcciones de estabilidad.');
          "

      - name: Create or Update GitHub Release with Changelog & Commit Summary
        if: matrix.os == 'ubuntu-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES_BODY.md
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Publish Electron Package
        run: npx electron-builder --publish always
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
